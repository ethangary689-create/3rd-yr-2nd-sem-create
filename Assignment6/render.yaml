# render.yaml — Render Blueprint (Infrastructure as Code)
# Deploy with: https://render.com/docs/blueprint-spec

databases:
  - name: photoalbum-db
    databaseName: photoalbum_db
    plan: free
    region: oregon

services:
  - type: web
    name: photoalbum
    plan: free
    region: oregon
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn photoalbum.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: photoalbum-db
          property: connectionString
      - key: CLOUDINARY_URL
        sync: false  # Must be set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.7"
